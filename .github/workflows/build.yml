          - MQ-WITI-512
          # NEWIFI
          - NEWIFI-D1
          - NEWIFI-D2
          - NEWIFI-MINI
          - NEWIFI-Y1S
          # NEXX
          - WT3020A
          - WT3020H
          - WT3020H16M
          # PHICOMM
          - 256PSG1218
          - PSG1218
          # SAMSUNG
          - SWR1100
          # SERCOMM
          - RT-S1010
          - SMARTBOX_SPI
          - SMBXPRONAND
          - SMBXTURBO
          # SNR
          - SNR-MD1
          - SNR-ME1
          - SNR-W4N-M
          - SNR-W4N-M_USB
          # TOTOLINK
          - A3004NS
          # TPLINK
          - TL_C2-V1
          - TL_C20-V1
          - TL_C20-V1_16M
          - TL_C20-V4
          - TL_C20-V5
          - TL_C5-V4
          - TL_C50-V1
          - TL_C50-V3
          - TL_C50-V4
          - TL_EC220_G5-V2
          - TL_MR200-V1
          - TL_MR3020-V3
          - TL_MR3420-V5
          - TL_WDR7300-V5
          - TL_WR840N-V4
          - TL_WR840N-V4_USB
          - TL_WR840N-V5
          - TL_WR840N-V5_RU
          - TL_WR840N-V6
          - TL_WR841N-V13
          - TL_WR841N-V13_USB
          - TL_WR841N-V14
          - TL_WR841N-V14_8M
          - TL_WR842N-V5
          - TL_WR845N-V3
          - TL_WR845N-V4
          # TUOSHI
          - TS7620N
          # UBNT
          - UBNT-ERX
          # UNIELEC
