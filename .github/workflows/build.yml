              # [移除] 架構錯誤，MIPS 不需要這些
              # "CONFIG_LINUX32 y"
              # "CONFIG_LINUX64 y"
              # [移除] 容器相關，MIPS 效能差且少用
              # "CONFIG_SETPRIV y"
              # "CONFIG_FEATURE_SETPRIV_DUMP y"
              # "CONFIG_FEATURE_SETPRIV_CAPABILITIES y"
              # "CONFIG_FEATURE_SETPRIV_CAPABILITY_NAMES y"
