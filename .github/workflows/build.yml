          - MI-4
          - MI-MINI
          - MI-NANO
          - MI-R3G
          - MI-R3G_SPI
          - MI-R3PRO
          - MI-R3P_SPI
          - R2100
          - RM-AC2100
          # YOUHUA
          - WR1200JS
          # YOUKU
          - YK-L1
          - YK-L1C
          # ZBT
          - ZBT-WE1326
          - ZBT-WE1626
          - ZBT-WE826T2
          - ZBT-WG3526-32
          - ZBT-WG3526
          - ZBT-WR8305RT
          # ZTE
          - ZTE_E8820S
          # ZYXEL
          - KN-4G3
          - KN-4G3B
          - KN-EXTRA
          - KN-EXTRA2
          - KN-GIGA3
          - KN-LITE
